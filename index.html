<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront - Toko Saya</title>
    <style>
        /* Desain tampilan toko Anda */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; }
        .navbar { background-color: #007bff; color: white; padding: 15px; font-weight: bold; border-radius: 8px; margin-bottom: 20px; }
        .produk-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card-produk { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .loading { text-align: center; font-size: 18px; color: #666; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="navbar">🛒 Selamat Datang di Toko Online Kami</div>

    <div id="loading" class="loading">Sedang memuat produk... mohon tunggu...</div>
    <div class="produk-container" id="produkList"></div>

<script>
    // 1. Masukkan URL Web App Google Apps Script Anda di sini
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyrRXp1HP1SrGUnJCvasF-yC-UFk5i1gt_fmQJwqEWn8H7L3Iwdvr82fsFCEwYuyrQK/exec";

    // 2. Ambil data produk saat halaman pertama kali dibuka di GitHub
    document.addEventListener("DOMContentLoaded", function() {
        // Kita panggil BACKEND_URL dengan menambahkan parameter ?action=getProduk
        fetch(`${BACKEND_URL}?action=getProduk`, {
            method: "GET",
            mode: "cors"
        })
        .then(response => response.json())
        .then(response => {
            // Sembunyikan tulisan loading jika data berhasil didapat
            document.getElementById("loading").style.display = "none";
            
            const produkList = document.getElementById("produkList");
            
            // Contoh parsing data (Sesuaikan dengan struktur array data produk Anda)
            if (response.status === "success") {
                // Misal response Anda mengembalikan list produk
                // response.data.forEach(produk => { ... })
                
                // Ini demo tampilan teks statis jika koneksi sukses:
                produkList.innerHTML = `<div class="card-produk">
                    <h3>Koneksi Sukses!</h3>
                    <p>Halaman storefront berhasil dimuat dari GitHub tanpa banner Google.</p>
                </div>`;
            }
        })
        .catch(error => {
            document.getElementById("loading").innerText = "Gagal memuat data toko.";
            console.error("Error:", error);
        });
    });
</script>

</body>
</html>
