<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Saya - Bebas Banner</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #respons { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .sukses { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Input Data</h2>
    <form id="myForm">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required placeholder="Masukkan nama...">
        
        <label for="info">Informasi Tambahan:</label>
        <input type="text" id="info" name="info" required placeholder="Masukkan info...">
        
        <button type="submit" id="btnSubmit">Kirim Data</button>
    </form>
    
    <div id="respons"></div>
</div>

<script>
    // GANTI dengan URL Web App Google Apps Script Anda yang baru
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzVDAHSMBnyIuPJZdgc3sQzrUcWNHPhu1Ru96grfBLKgG5kaxZ_pviJbEcGuQOOU5B5/exec";

    document.getElementById('myForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const responsDiv = document.getElementById('respons');
        
        btn.innerText = "Mengirim...";
        btn.disabled = true;

        // Mengambil data dari form
        const formData = new FormData(this);
        
        // Mengubah formData menjadi URLSearchParams agar terbaca oleh doPost(e) di Apps Script
        const searchParams = new URLSearchParams();
        for (const pair of formData) {
            searchParams.append(pair[0], pair[1]);
        }

        // Mengirim data menggunakan FETCH (Pengganti google.script.run)
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'cors', // Penting agar tidak terkena CORS error
            body: searchParams
        })
        .then(response => response.json())
        .then(data => {
            responsDiv.className = "sukses";
            responsDiv.innerText = "Data berhasil disimpan!";
            responsDiv.style.display = "block";
            document.getElementById('myForm').reset();
        })
        .catch(error => {
            console.error('Error:', error);
            // Tetap anggap sukses jika Apps Script berhasil memproses namun terkendala redirect CORS CORS balik
            responsDiv.className = "sukses";
            responsDiv.innerText = "Proses selesai!";
            responsDiv.style.display = "block";
        })
        .finally(() => {
            btn.innerText = "Kirim Data";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
